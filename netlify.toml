# Netlify configuration — Feasibility Study Company
# Static site (no build step) served from the repository root, plus one
# serverless function that handles the contact form.

[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# The contact form posts to /api/contact. Rewrite that to the function so the
# front-end endpoint stays clean and unchanged.
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
  force = true
